<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1a2e"/>
      <stop offset="100%" style="stop-color:#0f2744"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <rect x="48" y="48" width="416" height="416" rx="72" fill="none" stroke="url(#accent)" stroke-width="6" opacity="0.3"/>
  <!-- M letterform -->
  <text x="256" y="340" font-family="Arial Black,sans-serif" font-size="280" font-weight="900" fill="url(#accent)" text-anchor="middle" letter-spacing="-10">M</text>
  <!-- Pro dot -->
  <circle cx="400" cy="148" r="28" fill="#10b981"/>
  <!-- Bottom label -->
  <text x="256" y="468" font-family="Arial,sans-serif" font-size="52" font-weight="700" fill="#0ea5e9" text-anchor="middle" opacity="0.8">PRO</text>
</svg>
