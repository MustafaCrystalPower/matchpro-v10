[build]
command = '''
  apk add --no-cache python3 make g++ &&
  npm install --production &&
  echo \"Build complete\"
'''

[deploy]
startCommand = \"node scripts/startup.js\"
healthcheckPath = \"/health\"
healthcheckTimeout = 120

